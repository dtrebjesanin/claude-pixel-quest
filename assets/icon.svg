<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Pixel-art goblin character — 8x8 grid at 3px per cell -->

  <!-- Pointy ear tips (top corners) -->
  <rect x="0" y="0" width="3" height="3" fill="currentColor"/>
  <rect x="21" y="0" width="3" height="3" fill="currentColor"/>

  <!-- Head + ear base -->
  <rect x="0" y="3" width="24" height="3" fill="currentColor"/>

  <!-- Eyes row — two 3px eye holes -->
  <rect x="3" y="6" width="3" height="3" fill="currentColor"/>
  <rect x="9" y="6" width="6" height="3" fill="currentColor"/>
  <rect x="18" y="6" width="3" height="3" fill="currentColor"/>

  <!-- Lower face -->
  <rect x="3" y="9" width="18" height="3" fill="currentColor"/>

  <!-- Chin / neck -->
  <rect x="6" y="12" width="12" height="3" fill="currentColor"/>

  <!-- Body + arms -->
  <rect x="3" y="15" width="18" height="3" fill="currentColor"/>

  <!-- Legs -->
  <rect x="6" y="18" width="3" height="3" fill="currentColor"/>
  <rect x="15" y="18" width="3" height="3" fill="currentColor"/>

  <!-- Feet -->
  <rect x="3" y="21" width="6" height="3" fill="currentColor"/>
  <rect x="15" y="21" width="6" height="3" fill="currentColor"/>
</svg>
